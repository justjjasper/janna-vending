<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Janna Vending provides premium smart vending solutions for offices, gyms, warehouses, and apartment complexes across the Los Angeles area. No-cost installation, cashless payments, and fully managed restocking."

    <title>Janna Vending — Smart Vending for Modern Workplaces</title>
    <script>
      (function () {
        var stored = localStorage.getItem('janna-theme');
        if (stored !== 'light') {
          document.documentElement.classList.add('dark');
        }
      })();
    </script>

    <script type="module" src="/src/main.tsx"></script>
